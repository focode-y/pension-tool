<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>跨国养老金专业测算</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Noto+Sans+SC:wght@400;700;900&display=swap');
        
        body { 
            font-family: 'Inter', 'Noto Sans SC', sans-serif;
            background-color: #f1f5f9;
            color: #1e293b;
        }

        .gradient-header {
            background: linear-gradient(135deg, #1e293b 0%, #334155 100%);
            padding-bottom: 140px;
        }

        .tab-button {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .tab-active {
            color: white !important;
            background: #2563eb;
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.3);
        }

        .main-container {
            margin-top: -120px;
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.15);
        }

        .info-box {
            background: #f8fafc;
            border-left: 4px solid #3b82f6;
            padding: 10px 12px;
            border-radius: 0 12px 12px 0;
            font-size: 0.75rem;
            color: #475569;
        }

        .slider-custom::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 22px;
            height: 22px;
            background: #2563eb;
            border: 3px solid #ffffff;
            border-radius: 50%;
            cursor: pointer;
        }

        .result-panel {
            background: linear-gradient(180deg, #1e293b 0%, #0f172a 100%);
            color: #f8fafc;
            border-radius: 20px;
        }

        /* 新增：文章链接样式 */
        .article-card {
            display: flex;
            align-items: center;
            background: #f8fafc;
            border-radius: 12px;
            padding: 12px 16px;
            margin-bottom: 8px;
            text-decoration: none;
            transition: all 0.2s;
            border: 1px solid #e2e8f0;
        }
        .article-card:active {
            transform: scale(0.98);
            background: #f1f5f9;
        }
    </style>
</head>
<body class="pb-20">

    <!-- 顶部导航 -->
    <div class="gradient-header pt-10 px-6 text-center">
        <h1 class="text-white text-2xl font-black mb-6">养老金测算助手</h1>
        
        <div class="inline-flex p-1 bg-slate-800/50 rounded-2xl backdrop-blur-md border border-white/10">
            <button onclick="switchCountry('CN')" id="tab-cn" class="tab-button tab-active px-10 py-3 rounded-xl text-sm font-bold flex items-center gap-2 text-slate-400">
                🇨🇳 中国
            </button>
            <button onclick="switchCountry('JP')" id="tab-jp" class="tab-button px-10 py-3 rounded-xl text-sm font-bold flex items-center gap-2 text-slate-400">
                🇯🇵 日本
            </button>
        </div>
    </div>

    <div class="max-w-[500px] mx-auto px-4">
        <div class="main-container bg-white p-6">
            
            <!-- 地区选择 -->
            <div id="region-section" class="mb-6">
                <label class="block text-xs font-bold text-slate-400 uppercase tracking-widest mb-2">缴纳/居住地区</label>
                <select id="region-select" onchange="calculate()" class="w-full bg-slate-100 border-none rounded-xl px-4 py-4 font-bold text-slate-800 focus:ring-2 focus:ring-blue-500">
                </select>
            </div>

            <!-- 基本信息 -->
            <div class="grid grid-cols-2 gap-4 mb-6">
                <div>
                    <label class="block text-xs font-bold text-slate-400 uppercase tracking-widest mb-2">当前年龄</label>
                    <input type="number" id="age" value="30" oninput="calculate()" class="w-full bg-slate-100 border-none rounded-xl px-4 py-4 font-bold text-slate-800">
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-400 uppercase tracking-widest mb-2">参保类型</label>
                    <select id="person-type" onchange="calculate()" class="w-full bg-slate-100 border-none rounded-xl px-4 py-4 font-bold text-slate-800">
                    </select>
                </div>
            </div>

            <!-- 核心输入区 -->
            <div class="space-y-6 mb-8">
                <!-- 账户余额/收入 -->
                <div>
                    <div class="flex justify-between items-center mb-2">
                        <label id="income-label" class="text-xs font-bold text-slate-500 uppercase">账户累计余额 (CNY)</label>
                        <span id="income-unit" class="text-[10px] text-blue-600 font-bold bg-blue-50 px-2 py-0.5 rounded">累计额</span>
                    </div>
                    <input type="number" id="income-value" value="120000" oninput="calculate()" class="w-full bg-slate-100 border-none rounded-xl px-4 py-4 font-bold text-slate-800 focus:ring-2 focus:ring-blue-500 mb-3">
                    
                    <div id="cn-help-box" class="info-box">
                        <strong>🔍 如何查询：</strong> 打开“支付宝/微信-社保服务”或“掌上12333”APP，查看“养老保险个人权益单”中的<b>个人账户累计储存额</b>。
                    </div>
                </div>

                <!-- 指数说明 -->
                <div id="index-section">
                    <div class="flex justify-between items-end mb-3">
                        <div>
                            <label class="text-xs font-bold text-slate-500 uppercase">平均缴费工资指数</label>
                            <p class="text-[10px] text-slate-400">1.0 代表按社平工资缴费</p>
                        </div>
                        <span id="index-display" class="text-blue-600 font-black text-xl">1.0</span>
                    </div>
                    <input type="range" id="index-slider" min="0.6" max="3.0" step="0.1" value="1.0" oninput="calculate()" class="w-full h-2 bg-slate-200 rounded-lg appearance-none slider-custom">
                    <div class="flex justify-between text-[10px] text-slate-400 mt-2 font-bold uppercase">
                        <span>最低(0.6)</span>
                        <span>平均(1.0)</span>
                        <span>最高(3.0)</span>
                    </div>
                </div>

                <!-- 缴费年限 -->
                <div>
                    <label class="block text-xs font-bold text-slate-400 uppercase tracking-widest mb-2">预计总缴费年限</label>
                    <div class="flex items-center gap-3">
                        <input type="number" id="years" value="35" oninput="calculate()" class="w-full bg-slate-100 border-none rounded-xl px-4 py-4 font-bold text-slate-800">
                        <span class="text-slate-400 font-bold">Years</span>
                    </div>
                </div>
            </div>

            <!-- 结果 -->
            <div class="result-panel p-6">
                <div class="flex justify-between items-start mb-6">
                    <div>
                        <p class="text-slate-400 text-[11px] font-bold uppercase tracking-widest">预估每月领取 (预计)</p>
                        <div class="flex items-baseline gap-1 mt-2">
                            <span id="res-currency" class="text-xl font-bold text-blue-400">¥</span>
                            <span id="res-total" class="text-4xl font-black tracking-tighter">0</span>
                        </div>
                    </div>
                    <div class="bg-white/10 px-3 py-1.5 rounded-lg text-right">
                        <p class="text-[9px] text-slate-500 uppercase font-bold">退休年龄</p>
                        <p id="res-retire-age" class="text-sm font-black text-white">--</p>
                    </div>
                </div>

                <div class="space-y-4 pt-6 border-t border-white/10">
                    <div class="flex justify-between items-center">
                        <span id="sub-label-1" class="text-slate-400 text-xs font-bold">基础养老金/老龄基础</span>
                        <span id="sub-val-1" class="text-white text-sm font-black">--</span>
                    </div>
                    <div class="flex justify-between items-center">
                        <span id="sub-label-2" class="text-slate-400 text-xs font-bold">个人账户/厚生年金</span>
                        <span id="sub-val-2" class="text-white text-sm font-black">--</span>
                    </div>
                </div>
            </div>

            <!-- 文章链接区域 -->
            <div class="mt-8 space-y-3">
                <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest text-center mb-4">💡 深度阅读 · 政策详解</p>
                
                <a href="http://xhslink.com/o/7hJ6WeTQKts" target="_blank" class="article-card">
                    <span class="text-red-500 mr-3">
                        <svg width="18" height="18" fill="currentColor" viewBox="0 0 16 16"><path d="M4 4.85v.9h1v-.9H4Zm7 0v.9h1v-.9h-1Zm-7 1.8v.9h1v-.9H4Zm7 0v.9h1v-.9h-1Zm-7 1.8v.9h1v-.9H4Zm7 0v.9h1v-.9h-1ZM5 4a1 1 0 0 0-1 1v6a1 1 0 0 0 1 1h6a1 1 0 0 0 1-1V5a1 1 0 0 0-1-1H5Z"/><path d="M2.5 0A2.5 2.5 0 0 0 0 2.5v11A2.5 2.5 0 0 0 2.5 16h11a2.5 2.5 0 0 0 2.5-2.5v-11A2.5 2.5 0 0 0 13.5 0h-11ZM1 2.5A1.5 1.5 0 0 1 2.5 1h11A1.5 1.5 0 0 1 15 2.5v11a1.5 1.5 0 0 1-1.5 1.5h-11A1.5 1.5 0 0 1 1 13.5v-11Z"/></svg>
                    </span>
                    <span class="text-xs font-bold text-slate-700 flex-grow">永住回国后，日本年金还能领取吗？</span>
                    <span class="text-slate-300">
                        <svg width="12" height="12" fill="currentColor" viewBox="0 0 16 16"><path d="M4.646 1.646a.5.5 0 0 1 .708 0l6 6a.5.5 0 0 1 0 .708l-6 6a.5.5 0 0 1-.708-.708L10.293 8 4.646 2.354a.5.5 0 0 1 0-.708z"/></svg>
                    </span>
                </a>

                <a href="http://xhslink.com/o/9ANdq7YhQwq" target="_blank" class="article-card">
                    <span class="text-red-500 mr-3">
                        <svg width="18" height="18" fill="currentColor" viewBox="0 0 16 16"><path d="M4 4.85v.9h1v-.9H4Zm7 0v.9h1v-.9h-1Zm-7 1.8v.9h1v-.9H4Zm7 0v.9h1v-.9h-1Zm-7 1.8v.9h1v-.9H4Zm7 0v.9h1v-.9h-1ZM5 4a1 1 0 0 0-1 1v6a1 1 0 0 0 1 1h6a1 1 0 0 0 1-1V5a1 1 0 0 0-1-1H5Z"/><path d="M2.5 0A2.5 2.5 0 0 0 0 2.5v11A2.5 2.5 0 0 0 2.5 16h11a2.5 2.5 0 0 0 2.5-2.5v-11A2.5 2.5 0 0 0 13.5 0h-11ZM1 2.5A1.5 1.5 0 0 1 2.5 1h11A1.5 1.5 0 0 1 15 2.5v11a1.5 1.5 0 0 1-1.5 1.5h-11A1.5 1.5 0 0 1 1 13.5v-11Z"/></svg>
                    </span>
                    <span class="text-xs font-bold text-slate-700 flex-grow">离开日本，已交的年金能退多少钱？</span>
                    <span class="text-slate-300">
                        <svg width="12" height="12" fill="currentColor" viewBox="0 0 16 16"><path d="M4.646 1.646a.5.5 0 0 1 .708 0l6 6a.5.5 0 0 1 0 .708l-6 6a.5.5 0 0 1-.708-.708L10.293 8 4.646 2.354a.5.5 0 0 1 0-.708z"/></svg>
                    </span>
                </a>
            </div>

            <p class="mt-8 text-[10px] text-slate-400 text-center leading-relaxed">
                本工具为模拟试算，不代表官方承诺。<br>中国算法包含2025新政延迟退休逻辑。<br>
                日本算法按厚生劳动省标准模型换算为月度数据。
            </p>
        </div>
    </div>

    <script>
        let currentCountry = 'CN';

        const CN_DATA = {
            regions: [
                { name: '北京', base: 12049 },
                { name: '上海', base: 12183 },
                { name: '广东', base: 9420 },
                { name: '浙江', base: 8210 },
                { name: '江苏', base: 8613 },
                { name: '山东', base: 7450 },
                { name: '全国平均', base: 7500 }
            ],
            types: [
                { id: 'male', name: '男职工', retire: 60 },
                { id: 'female_c', name: '女干部', retire: 55 },
                { id: 'female_w', name: '女工人', retire: 50 }
            ]
        };

        const JP_DATA = {
            regions: [
                { name: '日本全境 (统一标准)', base: 0 }
            ],
            types: [
                { id: 'jp_standard', name: '厚生年金 (企业员工)', retire: 65 },
                { id: 'jp_basic', name: '国民年金 (自营业)', retire: 65 }
            ]
        };

        function switchCountry(code) {
            currentCountry = code;
            
            document.getElementById('tab-cn').classList.toggle('tab-active', code === 'CN');
            document.getElementById('tab-jp').classList.toggle('tab-active', code === 'JP');
            
            const regionSelect = document.getElementById('region-select');
            const personSelect = document.getElementById('person-type');
            const indexSection = document.getElementById('index-section');
            const incomeLabel = document.getElementById('income-label');
            const incomeValue = document.getElementById('income-value');
            const helpBox = document.getElementById('cn-help-box');
            const resCurrency = document.getElementById('res-currency');

            if (code === 'CN') {
                indexSection.style.display = 'block';
                helpBox.style.display = 'block';
                incomeLabel.innerText = '账户累计余额 (CNY)';
                incomeValue.value = 150000;
                resCurrency.innerText = '¥';
                
                regionSelect.innerHTML = CN_DATA.regions.map(r => `<option value="${r.base}">${r.name} (基数: ${r.base})</option>`).join('');
                personSelect.innerHTML = CN_DATA.types.map(t => `<option value="${t.id}">${t.name}</option>`).join('');
            } else {
                indexSection.style.display = 'none';
                helpBox.style.display = 'none';
                incomeLabel.innerText = '预计平均年收入 (万JPY)';
                incomeValue.value = 500;
                resCurrency.innerText = '円';

                regionSelect.innerHTML = JP_DATA.regions.map(r => `<option value="${r.base}">${r.name}</option>`).join('');
                personSelect.innerHTML = JP_DATA.types.map(t => `<option value="${t.id}">${t.name}</option>`).join('');
            }
            
            calculate();
        }

        function calculate() {
            if (currentCountry === 'CN') {
                calcChina();
            } else {
                calcJapan();
            }
        }

        function calcChina() {
            const base = parseFloat(document.getElementById('region-select').value);
            const age = parseInt(document.getElementById('age').value) || 0;
            const type = document.getElementById('person-type').value;
            const balance = parseFloat(document.getElementById('income-value').value) || 0;
            const years = parseInt(document.getElementById('years').value) || 0;
            const idx = parseFloat(document.getElementById('index-slider').value);
            
            document.getElementById('index-display').innerText = idx.toFixed(1);

            let originalRetire = CN_DATA.types.find(t => t.id === type).retire;
            let delayMonths = 0;
            const birthYear = new Date().getFullYear() - age;
            if (birthYear + originalRetire >= 2025) {
                const step = (type === 'female_w') ? 2 : 3;
                delayMonths = Math.min(Math.ceil(((birthYear + originalRetire - 2025) * 12) / step), 36);
            }
            const finalRetire = originalRetire + (delayMonths / 12);

            let divisor = 139;
            if (finalRetire <= 50) divisor = 195;
            else if (finalRetire <= 55) divisor = 170;
            else if (finalRetire >= 60) divisor = 139 - (finalRetire - 60) * 7; 

            const p1 = (base + base * idx) / 2 * years * 0.01;
            const p2 = balance / divisor;
            const total = p1 + p2;

            updateUI(total, p1, p2, finalRetire.toFixed(1), "基础养老金", "个人账户金", "¥");
        }

        function calcJapan() {
            const avgIncome = parseFloat(document.getElementById('income-value').value) || 0;
            const years = parseInt(document.getElementById('years').value) || 0;
            const type = document.getElementById('person-type').value;

            const p1_year = 816000 * (Math.min(years, 40) / 40);
            const p1_month = p1_year / 12;
            
            let p2_month = 0;
            if (type === 'jp_standard') {
                const p2_year = (avgIncome * 10000) * 0.005481 * (years * 12) / 12; 
                p2_month = p2_year / 12;
            }

            const total = p1_month + p2_month;
            updateUI(total, p1_month, p2_month, "65 (满额)", "老齢基礎 (月)", "老齢厚生 (月)", "円");
        }

        function updateUI(total, s1, s2, retireAge, l1, l2, curr) {
            document.getElementById('res-total').innerText = Math.round(total).toLocaleString();
            document.getElementById('sub-label-1').innerText = l1;
            document.getElementById('sub-label-2').innerText = l2;
            document.getElementById('sub-val-1').innerText = curr + ' ' + Math.round(s1).toLocaleString();
            document.getElementById('sub-val-2').innerText = curr + ' ' + Math.round(s2).toLocaleString();
            document.getElementById('res-retire-age').innerText = retireAge + " 岁";
        }

        window.onload = () => switchCountry('CN');
    </script>
</body>
</html>
